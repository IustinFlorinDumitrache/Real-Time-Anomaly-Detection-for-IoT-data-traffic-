version: '3.8'
services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb_orange
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=parola_secreta_123
      - DOCKER_INFLUXDB_INIT_ORG=orange-iot
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-token-123

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_orange
    ports:
      - "3000:3000"
    depends_on:
      - influxdb